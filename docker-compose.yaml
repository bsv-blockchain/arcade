services:
  aerospike:
    image: docker.io/aerospike/aerospike-server:latest
    ports:
      - "3200:3000"
      - "3201:3001"
      - "3202:3002"
    volumes:
      - aerospike-data:/opt/aerospike/data:Z
      - ./aerospike.conf:/opt/aerospike/etc/aerospike.conf:Z
    command: ["--config-file", "/opt/aerospike/etc/aerospike.conf"]
    networks:
      - arcade-net

  zookeeper:
    image: docker.io/confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: "2181"
      ZOOKEEPER_TICK_TIME: "2000"
    ports:
      - "2181:2181"
    networks:
      - arcade-net

  kafka:
    image: docker.io/confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9492:9492"
    environment:
      KAFKA_BROKER_ID: "1"
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9492"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9492"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - arcade-net

  # Local validation collector for the OTEL telemetry pipeline (see
  # docs/plans/otel-integration.md and tools/otel-collector.yaml). Not
  # required for normal development: telemetry defaults to disabled, and
  # arcade behaves identically whether or not this service is running.
  # Enable telemetry against it with
  #   ARCADE_TELEMETRY_ENABLED=true ARCADE_TELEMETRY_ENDPOINT=localhost:4317
  # (or the standard OTEL_EXPORTER_OTLP_ENDPOINT=http://$(HOST_IP):4317 in a
  # cluster where the collector runs as a node-local agent), then
  # `docker compose logs otel-collector` to see traces/metrics land.
  otel-collector:
    image: docker.io/otel/opentelemetry-collector-contrib:0.142.0
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./tools/otel-collector.yaml:/etc/otel-collector.yaml:Z
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - arcade-net

networks:
  arcade-net:
    driver: bridge

volumes:
  aerospike-data:
