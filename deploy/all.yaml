# All-in-One Deployment
#
# Runs all services in a single pod. Useful for development and testing.
# In mode=all every service is launched as a goroutine in one process
# and each binds its own port:
#   - 8080: api-server
#   - 8081: health probe (shared)
#   - 8082: sse
#   - 8083: chaintracks
#
# This mode is intentionally NOT how mainnet runs — production uses the
# per-mode microservices (api-server, sse, chaintracks, propagation,
# bump-builder, watchdog). Use mode=all only for local development or
# evaluating arcade end-to-end against a single Redpanda + Postgres.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arcade-all
  namespace: arcade
  labels:
    app.kubernetes.io/name: all
    app.kubernetes.io/part-of: arcade
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: all
  template:
    metadata:
      labels:
        app.kubernetes.io/name: all
        app.kubernetes.io/part-of: arcade
    spec:
      containers:
        - name: arcade
          image: ghcr.io/bsv-blockchain/arcade:v0.6.5
          imagePullPolicy: Always
          args: ["--mode", "all"]
          env:
            # mode=all owns its own embedded chaintracks instance in-process,
            # so override the shared config.yaml's chaintracks.mode=remote.
            - name: ARCADE_CHAINTRACKS_MODE
              value: "embedded"
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
            - containerPort: 8081
              name: health
              protocol: TCP
            - containerPort: 8082
              name: sse
              protocol: TCP
            - containerPort: 8083
              name: chaintracks
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/arcade/config.yaml
              subPath: config.yaml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: arcade-config
