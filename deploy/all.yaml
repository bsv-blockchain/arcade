# All-in-One Deployment
#
# Runs all services in a single pod. Useful for development and testing.
# In mode=all every service is launched as a goroutine in one process
# and each binds its own port:
#   - 8080: api-server
#   - 8081: health probe (shared)
#   - 8082: sse
#   - 8083: chaintracks
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arcade-all
  namespace: arcade
  labels:
    app.kubernetes.io/name: all
    app.kubernetes.io/part-of: arcade
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: all
  template:
    metadata:
      labels:
        app.kubernetes.io/name: all
        app.kubernetes.io/part-of: arcade
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: arcade
          image: ghcr.io/bsv-blockchain/arcade:latest
          args: ["--mode", "all"]
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
            - containerPort: 8081
              name: health
              protocol: TCP
            - containerPort: 8082
              name: sse
              protocol: TCP
            - containerPort: 8083
              name: chaintracks
              protocol: TCP
          env:
            - name: ARCADE_KAFKA_BROKERS
              value: "kafka-0.kafka.arcade.svc.cluster.local:9092"
            - name: ARCADE_AEROSPIKE_HOSTS
              value: "aerospike-0.aerospike.arcade.svc.cluster.local:3000"
            - name: ARCADE_AEROSPIKE_NAMESPACE
              value: "arcade"
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 15
            periodSeconds: 30
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
