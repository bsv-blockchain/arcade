# Watchdog Deployment
#
# Block-processing recovery service. Periodically scans block_processing
# for rows whose chaintracks header arrived but whose BLOCK_PROCESSED
# callback never landed; calls merkle-service POST /reprocess to recover.
# Coordination via the `block-processing-watchdog` store lease, so
# replicas>1 elect a single ticker and pile-on doesn't burn merkle-service.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: watchdog
  namespace: arcade
  labels:
    app.kubernetes.io/name: watchdog
    app.kubernetes.io/part-of: arcade
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: watchdog
  template:
    metadata:
      labels:
        app.kubernetes.io/name: watchdog
        app.kubernetes.io/part-of: arcade
    spec:
      containers:
        - name: watchdog
          image: ghcr.io/bsv-blockchain/arcade:v0.6.5
          imagePullPolicy: Always
          args: ["--mode", "watchdog"]
          ports:
            - containerPort: 8081
              name: health
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/arcade/config.yaml
              subPath: config.yaml
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 60
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: arcade-config
