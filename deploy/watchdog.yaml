# Watchdog Deployment
#
# Block-processing recovery service. Periodically scans block_processing
# for rows whose chaintracks header arrived but whose BLOCK_PROCESSED
# callback never landed; calls merkle-service POST /reprocess to recover.
# Coordination via the `block-processing-watchdog` store lease, so
# replicas>1 elect a single ticker and pile-on doesn't burn merkle-service.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arcade-watchdog
  namespace: arcade
  labels:
    app.kubernetes.io/name: watchdog
    app.kubernetes.io/part-of: arcade
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: watchdog
  template:
    metadata:
      labels:
        app.kubernetes.io/name: watchdog
        app.kubernetes.io/part-of: arcade
    spec:
      containers:
        - name: arcade
          image: ghcr.io/bsv-blockchain/arcade:latest
          args: ["--mode", "watchdog"]
          ports:
            - containerPort: 8081
              name: health
              protocol: TCP
          env:
            - name: ARCADE_KAFKA_BROKERS
              value: "kafka-0.kafka.arcade.svc.cluster.local:9092"
            - name: ARCADE_AEROSPIKE_HOSTS
              value: "aerospike-0.aerospike.arcade.svc.cluster.local:3000"
            - name: ARCADE_AEROSPIKE_NAMESPACE
              value: "arcade"
            # HOST_IP feeds OTEL_EXPORTER_OTLP_ENDPOINT below to reach the
            # node-local OTLP collector via the Kubernetes downward API; it
            # MUST be defined before its $(HOST_IP) use. Telemetry itself
            # stays off (ARCADE_TELEMETRY_ENABLED=false) until an operator
            # opts in — see docs/observability.md.
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://$(HOST_IP):4317"
            - name: ARCADE_TELEMETRY_ENABLED
              value: "false"
            - name: ARCADE_TELEMETRY_INSECURE
              value: "true"
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
