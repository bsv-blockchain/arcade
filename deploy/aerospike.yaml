# Aerospike StatefulSet — single-node instance for development/staging.
# For production, use the Aerospike Kubernetes Operator.
#
# Note: mainnet uses postgres as the arcade store backend, not aerospike,
# so this StatefulSet is shipped for parity but not consumed by the
# default deploy/config.yaml. To use aerospike instead, set
# store.backend: aerospike in deploy/config.yaml and add an
# store.aerospike block (see /git/arcade/config.example.yaml).
apiVersion: v1
kind: ConfigMap
metadata:
  name: aerospike-config
  namespace: arcade
  labels:
    app.kubernetes.io/name: aerospike
    app.kubernetes.io/part-of: arcade
data:
  aerospike.conf: |
    service {
        proto-fd-max 15000
        cluster-name arcade
    }

    logging {
        console {
            context any info
        }
    }

    network {
        service {
            address any
            port 3000
        }

        heartbeat {
            mode mesh
            port 3002
            interval 150
            timeout 10
        }

        fabric {
            port 3001
        }

        info {
            port 3003
        }
    }

    namespace arcade {
        replication-factor 1
        default-ttl 0
        nsup-period 120

        storage-engine device {
            file /opt/aerospike/data/arcade.dat
            filesize 8G
            read-page-cache true
        }
    }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: aerospike
  namespace: arcade
  labels:
    app.kubernetes.io/name: aerospike
    app.kubernetes.io/part-of: arcade
spec:
  serviceName: aerospike
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aerospike
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aerospike
        app.kubernetes.io/part-of: arcade
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: aerospike
          image: docker.io/aerospike/aerospike-server:8.1
          command: ["asd", "--foreground", "--config-file", "/opt/aerospike/etc/aerospike.conf"]
          ports:
            - containerPort: 3000
              name: service
              protocol: TCP
            - containerPort: 3001
              name: fabric
              protocol: TCP
            - containerPort: 3002
              name: heartbeat
              protocol: TCP
            - containerPort: 3003
              name: info
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: service
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: service
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /opt/aerospike/etc/aerospike.conf
              subPath: aerospike.conf
              readOnly: true
            - name: data
              mountPath: /opt/aerospike/data
      volumes:
        - name: config
          configMap:
            name: aerospike-config
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: aerospike
          app.kubernetes.io/part-of: arcade
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: aerospike
  namespace: arcade
  labels:
    app.kubernetes.io/name: aerospike
    app.kubernetes.io/part-of: arcade
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: aerospike
  ports:
    - port: 3000
      targetPort: service
      protocol: TCP
      name: service
    - port: 3001
      targetPort: fabric
      protocol: TCP
      name: fabric
    - port: 3002
      targetPort: heartbeat
      protocol: TCP
      name: heartbeat
