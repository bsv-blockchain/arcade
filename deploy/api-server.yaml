# API Server Deployment + Service
#
# Handles HTTP transaction submissions and status queries on port 8080.
#
# As of the microservice decomposition, this pod NO LONGER serves:
#   - /events (SSE)                → see deploy/sse.yaml (port 8082)
#   - /chaintracks/v1, /chaintracks/v2 → see deploy/chaintracks.yaml (port 8083)
# Update any external clients / Ingress routing to target those services.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: arcade
  labels:
    app.kubernetes.io/name: api-server
    app.kubernetes.io/part-of: arcade
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-server
        app.kubernetes.io/part-of: arcade
    spec:
      containers:
        - name: api-server
          image: ghcr.io/bsv-blockchain/arcade:v0.6.5
          imagePullPolicy: Always
          args: ["--mode", "api-server"]
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/arcade/config.yaml
              subPath: config.yaml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 60
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: arcade-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-server
  namespace: arcade
  labels:
    app.kubernetes.io/name: api-server
    app.kubernetes.io/part-of: arcade
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api-server
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
