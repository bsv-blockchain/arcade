# SSE Server Deployment + Service
#
# Serves Server-Sent Events to clients subscribed to transaction status
# updates. Extracted from api-server so slow SSE consumers can't
# backpressure /submit handling.
#
# Subscribes to the shared Kafka topic for status updates and reads
# submission metadata + per-tx status from the shared store for
# Last-Event-ID catchup. The pod is horizontally scalable — each replica
# binds its own Kafka consumer group so every replica receives every
# event independently.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arcade-sse
  namespace: arcade
  labels:
    app.kubernetes.io/name: sse
    app.kubernetes.io/part-of: arcade
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sse
        app.kubernetes.io/part-of: arcade
    spec:
      containers:
        - name: arcade
          image: ghcr.io/bsv-blockchain/arcade:latest
          args: ["--mode", "sse"]
          ports:
            - containerPort: 8082
              name: http
              protocol: TCP
            - containerPort: 8081
              name: health
              protocol: TCP
          env:
            - name: ARCADE_KAFKA_BROKERS
              value: "kafka-0.kafka.arcade.svc.cluster.local:9092"
            - name: ARCADE_AEROSPIKE_HOSTS
              value: "aerospike-0.aerospike.arcade.svc.cluster.local:3000"
            - name: ARCADE_AEROSPIKE_NAMESPACE
              value: "arcade"
            # HOST_IP feeds OTEL_EXPORTER_OTLP_ENDPOINT below to reach the
            # node-local OTLP collector via the Kubernetes downward API; it
            # MUST be defined before its $(HOST_IP) use. Telemetry itself
            # stays off (ARCADE_TELEMETRY_ENABLED=false) until an operator
            # opts in — see docs/observability.md.
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://$(HOST_IP):4317"
            - name: ARCADE_TELEMETRY_ENABLED
              value: "false"
            - name: ARCADE_TELEMETRY_INSECURE
              value: "true"
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: arcade-sse
  namespace: arcade
  labels:
    app.kubernetes.io/name: sse
    app.kubernetes.io/part-of: arcade
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sse
  ports:
    - port: 8082
      targetPort: http
      protocol: TCP
      name: http
