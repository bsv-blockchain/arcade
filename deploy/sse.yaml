# SSE Server Deployment + Service
#
# Serves Server-Sent Events to clients subscribed to transaction status
# updates. Extracted from api-server so slow SSE consumers can't
# backpressure /submit handling.
#
# Subscribes to the shared Kafka/Redpanda topic for status updates and
# reads submission metadata + per-tx status from the shared store for
# Last-Event-ID catchup. The pod is horizontally scalable — each replica
# binds its own consumer group so every replica receives every event
# independently.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sse
  namespace: arcade
  labels:
    app.kubernetes.io/name: sse
    app.kubernetes.io/part-of: arcade
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sse
        app.kubernetes.io/part-of: arcade
    spec:
      containers:
        - name: sse
          image: ghcr.io/bsv-blockchain/arcade:v0.6.5
          imagePullPolicy: Always
          args: ["--mode", "sse"]
          ports:
            - containerPort: 8082
              name: http
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/arcade/config.yaml
              subPath: config.yaml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 60
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: arcade-config
---
apiVersion: v1
kind: Service
metadata:
  name: sse
  namespace: arcade
  labels:
    app.kubernetes.io/name: sse
    app.kubernetes.io/part-of: arcade
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sse
  ports:
    - port: 8082
      targetPort: http
      protocol: TCP
      name: http
