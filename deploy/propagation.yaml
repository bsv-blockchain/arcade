# Propagation Service Deployment
#
# Consumes from Kafka/Redpanda, broadcasts transactions to Teranode endpoints.
# Manages retry buffer for dependent transaction chains.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: propagation
  namespace: arcade
  labels:
    app.kubernetes.io/name: propagation
    app.kubernetes.io/part-of: arcade
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: propagation
  template:
    metadata:
      labels:
        app.kubernetes.io/name: propagation
        app.kubernetes.io/part-of: arcade
    spec:
      containers:
        - name: propagation
          image: ghcr.io/bsv-blockchain/arcade:v0.6.5
          imagePullPolicy: Always
          args: ["--mode", "propagation"]
          ports:
            - containerPort: 8081
              name: health
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/arcade/config.yaml
              subPath: config.yaml
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 60
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: arcade-config
