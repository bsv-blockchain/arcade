# P2P Client Deployment
#
# Connects to the BSV P2P network, receives block announcements.
#
# Note: the bsva mainnet deployment does NOT run this mode — it ingests
# via a different path. This manifest is kept here as a reference for
# users running a self-hosted P2P ingest path.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: p2p-client
  namespace: arcade
  labels:
    app.kubernetes.io/name: p2p-client
    app.kubernetes.io/part-of: arcade
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: p2p-client
  template:
    metadata:
      labels:
        app.kubernetes.io/name: p2p-client
        app.kubernetes.io/part-of: arcade
    spec:
      containers:
        - name: p2p-client
          image: ghcr.io/bsv-blockchain/arcade:v0.6.5
          imagePullPolicy: Always
          args: ["--mode", "p2p-client"]
          ports:
            - containerPort: 8081
              name: health
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/arcade/config.yaml
              subPath: config.yaml
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 60
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: arcade-config
