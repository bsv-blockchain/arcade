# BUMP Builder Deployment
#
# Consumes merkle proof events, builds BUMP proofs for mined transactions.
#
# As of the microservice decomposition, this pod NO LONGER runs the
# block-processing watchdog — that responsibility moved to its own
# pod. See deploy/watchdog.yaml.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bump-builder
  namespace: arcade
  labels:
    app.kubernetes.io/name: bump-builder
    app.kubernetes.io/part-of: arcade
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bump-builder
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bump-builder
        app.kubernetes.io/part-of: arcade
    spec:
      containers:
        - name: bump-builder
          image: ghcr.io/bsv-blockchain/arcade:v0.6.5
          imagePullPolicy: Always
          args: ["--mode", "bump-builder"]
          ports:
            - containerPort: 8081
              name: health
              protocol: TCP
          env:
            # Talk to the chaintracks pod over HTTP instead of running an
            # embedded ChainManager + upstream header poller in this pod.
            # The chaintracks Service exposes /chaintracks/v1/* on 8083.
            # Without these overrides every bump-builder replica would
            # independently poll the upstream node, duplicating work the
            # chaintracks pod already does.
            - name: ARCADE_CHAINTRACKS_MODE
              value: "remote"
            - name: ARCADE_CHAINTRACKS_URL
              value: "http://chaintracks:8083"
          volumeMounts:
            - name: config
              mountPath: /etc/arcade/config.yaml
              subPath: config.yaml
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 60
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: arcade-config
