# Chaintracks Deployment + Service
#
# Standalone chaintracks pod. Hosts the embedded go-chaintracks instance,
# subscribes to P2P block-header pubsub, and writes block_processing
# rows whenever a new tip header or reorg event arrives. Downstream
# services (watchdog, api-server) consume block-header data from the
# shared store rather than calling into chaintracks directly.
#
# replicas MUST be 1: chaintracks owns local header storage (a single
# bbolt file in /data/chaintracks) and is not designed for multi-writer
# coordination. To run hot-standby, set up a separate Deployment with
# its own PVC and load-balance reads at the Service layer.
#
# Exposes /chaintracks/v1 (legacy RPC-style) and /chaintracks/v2 (JSON +
# binary + SSE) on port 8083 to external clients.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arcade-chaintracks
  namespace: arcade
  labels:
    app.kubernetes.io/name: chaintracks
    app.kubernetes.io/part-of: arcade
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: chaintracks
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chaintracks
        app.kubernetes.io/part-of: arcade
    spec:
      containers:
        - name: arcade
          image: ghcr.io/bsv-blockchain/arcade:latest
          args: ["--mode", "chaintracks"]
          ports:
            - containerPort: 8083
              name: http
              protocol: TCP
            - containerPort: 8081
              name: health
              protocol: TCP
          env:
            - name: ARCADE_KAFKA_BROKERS
              value: "kafka-0.kafka.arcade.svc.cluster.local:9092"
            - name: ARCADE_AEROSPIKE_HOSTS
              value: "aerospike-0.aerospike.arcade.svc.cluster.local:3000"
            - name: ARCADE_AEROSPIKE_NAMESPACE
              value: "arcade"
            - name: ARCADE_STORAGE_PATH
              value: "/data"
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: arcade-chaintracks-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: arcade-chaintracks-data
  namespace: arcade
  labels:
    app.kubernetes.io/name: chaintracks
    app.kubernetes.io/part-of: arcade
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: arcade-chaintracks
  namespace: arcade
  labels:
    app.kubernetes.io/name: chaintracks
    app.kubernetes.io/part-of: arcade
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: chaintracks
  ports:
    - port: 8083
      targetPort: http
      protocol: TCP
      name: http
