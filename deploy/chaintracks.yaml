# Chaintracks Deployment + Service
#
# Standalone chaintracks pod. Hosts the embedded go-chaintracks instance,
# subscribes to P2P block-header pubsub, and writes block_processing
# rows whenever a new tip header or reorg event arrives. Downstream
# services (watchdog, api-server) consume block-header data from the
# shared store rather than calling into chaintracks directly.
#
# replicas MUST be 1: chaintracks owns local header storage and is not
# designed for multi-writer coordination. To run hot-standby, set up a
# separate Deployment with its own PVC and load-balance reads at the
# Service layer.
#
# Exposes /chaintracks/v1 (legacy RPC-style) and /chaintracks/v2 (JSON +
# binary + SSE) on port 8083 to external clients.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaintracks
  namespace: arcade
  labels:
    app.kubernetes.io/name: chaintracks
    app.kubernetes.io/part-of: arcade
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: chaintracks
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chaintracks
        app.kubernetes.io/part-of: arcade
    spec:
      containers:
        - name: chaintracks
          image: ghcr.io/bsv-blockchain/arcade:v0.6.5
          imagePullPolicy: Always
          args: ["--mode", "chaintracks"]
          env:
            # Override the shared config.yaml's chaintracks.mode=remote.
            # This pod IS the chaintracks server — it has to run the
            # embedded ChainManager + upstream header poller; everyone
            # else (bump-builder, all-mode) treats it as a remote.
            - name: ARCADE_CHAINTRACKS_MODE
              value: "embedded"
          ports:
            - containerPort: 8083
              name: http
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/arcade/config.yaml
              subPath: config.yaml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 60
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: arcade-config
---
apiVersion: v1
kind: Service
metadata:
  name: chaintracks
  namespace: arcade
  labels:
    app.kubernetes.io/name: chaintracks
    app.kubernetes.io/part-of: arcade
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: chaintracks
  ports:
    - port: 8083
      targetPort: http
      protocol: TCP
      name: http
