# Redpanda StatefulSet — single-node, Kafka-compatible broker for
# development/staging.
#
# For production, install the Redpanda Operator and use a Redpanda CRD +
# Topic CRDs instead. See the mainnet reference:
#   bsva-infra-flux/apps/base/arcade-v2/_base/redpanda.yaml
#   bsva-infra-flux/apps/base/arcade-v2/_base/topics.yaml
#
# Production topic partition counts (matters once you scale consumers):
#   arcade.tx_status         16 partitions  (+ arcade.tx_status.dlq         16)
#   arcade.block_processed    8 partitions  (+ arcade.block_processed.dlq    8)
#   arcade.propagation        1 partition   (+ arcade.propagation.dlq        1)
# arcade.propagation has an enforced 1-partition correctness constraint —
# scaling that one up will fail arcade's startup check.
#
# Topics are auto-created here on first publish; arcade does not create
# them itself.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redpanda
  namespace: arcade
  labels:
    app.kubernetes.io/name: redpanda
    app.kubernetes.io/part-of: arcade
spec:
  serviceName: redpanda
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redpanda
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redpanda
        app.kubernetes.io/part-of: arcade
    spec:
      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:v24.2.10
          command:
            - /usr/bin/rpk
            - redpanda
            - start
            - --mode=dev-container
            - --smp=1
            - --memory=1G
            - --reserve-memory=0M
            - --overprovisioned
            - --node-id=0
            - --check=false
            - --kafka-addr=PLAINTEXT://0.0.0.0:9092
            - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
            - --rpc-addr=0.0.0.0:33145
            - --advertise-rpc-addr=redpanda-0.redpanda.arcade.svc.cluster.local:33145
            - --set=redpanda.auto_create_topics_enabled=true
          ports:
            - containerPort: 9092
              name: kafka
              protocol: TCP
            - containerPort: 33145
              name: rpc
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              cpu: 500m
              memory: 1500Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/redpanda/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: arcade
  labels:
    app.kubernetes.io/name: redpanda
    app.kubernetes.io/part-of: arcade
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: redpanda
  ports:
    - port: 9092
      targetPort: kafka
      protocol: TCP
      name: kafka
    - port: 33145
      targetPort: rpc
      protocol: TCP
      name: rpc
