# Arcade Server Configuration
# Environment variables can override any setting using ARCADE_ prefix
# Example: ARCADE_SERVER_ADDRESS=:9090 overrides server.address
network: main
storage_path: ~/.arcade
server:
  address: ":3011"
  read_timeout: 30s
  write_timeout: 30s
  shutdown_timeout: 10s
database:
  type: sqlite
  sqlite_path: ~/.arcade/arcade.db
events:
  type: memory
  buffer_size: 1000
teranode:
  # datahub_urls: Teranode DataHub URLs (formatted as <url>/api/v1)
  # Used for both transaction submission and block/subtree data fetching
  datahub_urls:
    - https://teranode-mainnet.taal.com/api/v1
  timeout: 30s
validator:
  max_tx_size: 4294967296
  max_script_size: 500000
  max_sig_ops: 4294967295
  min_fee_per_kb: 100
auth:
  enabled: false
webhook:
  prune_interval: 1h
  max_age: 24h
  max_retries: 10
merkle_service:
  # url: https://merkle-service.example.com  # Merkle Service API base URL (optional, enables merkle proof integration)
  # auth_token: ""                            # Bearer token for authenticating with Merkle Service
  # callback_base_url: http://localhost:3011  # Base URL for Arcade's callback endpoint
  # callback_token: ""                        # Bearer token Merkle Service uses when calling back
  timeout: 30s
chaintracks:
  # Arcade always runs chaintracks in embedded mode using its P2P client
  storage_path: ~/.arcade/chaintracks
  # bootstrap_url: https://example.com/headers.bin  # Optional: URL for initial header sync
