name: Build and Push to GHCR

# ------------------------------------------------------------------------------------
# Image Publishing Gating (F-041 / arcade#99)
# ------------------------------------------------------------------------------------
# This workflow publishes container images to GHCR. To prevent vulnerable or untested
# code from producing a release image, image publishing is gated on the GoFortress
# workflow (lint, govet, govulncheck, gitleaks, pre-commit, and tests) completing
# successfully.
#
# Triggers:
#   - workflow_run: fires after GoFortress completes on `main` or a `v*` tag push.
#     The gate job only proceeds when GoFortress's conclusion is `success` AND the
#     upstream run was a `push` event (filtering out PR-triggered GoFortress runs,
#     which are handled separately by the pull_request trigger below). For tag
#     pushes, the image tag is taken from `workflow_run.head_branch` (e.g. v1.2.3)
#     so the published image carries the release version, not just `latest`.
#   - pull_request: kept so PRs still build the image (with `push: false`) for
#     fast feedback. PR builds do NOT publish, so they don't need the gate.
#   - workflow_dispatch: manual run; gated via `needs:` chain on local jobs that
#     re-verify the head SHA passed GoFortress before publishing.
# ------------------------------------------------------------------------------------
# Multi-arch strategy
# ------------------------------------------------------------------------------------
# Each architecture is built on its native runner (`ubuntu-24.04` for amd64,
# `ubuntu-24.04-arm` for arm64) — no QEMU emulation. Each matrix job pushes a
# single-arch image to GHCR by digest only (no tag). The merge-manifest job then
# composes those digests into a single multi-arch manifest list under the existing
# tag scheme (`<sha>` and `latest` / `<git-tag>`).
# ------------------------------------------------------------------------------------

on:
  workflow_run:
    workflows: ["GoFortress"]
    types: [completed]
    branches:
      - main
      - "v*" # Tag pushes appear here as head_branch (e.g. v1.2.3)
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bsv-blockchain/arcade

jobs:
  # --------------------------------------------------------------------------------
  # Gate: ensure the upstream GoFortress run (lint, security, tests) succeeded.
  # For pull_request and workflow_dispatch this evaluates to `true` because no
  # workflow_run context exists; publishing is disabled in those modes anyway
  # (PRs use push: false; manual dispatch is operator-initiated and intentional).
  # --------------------------------------------------------------------------------
  gofortress-gate:
    name: Verify GoFortress gates passed
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    steps:
      - name: Confirm upstream gates
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "GoFortress conclusion: ${{ github.event.workflow_run.conclusion }}"
            echo "Head SHA: ${{ github.event.workflow_run.head_sha }}"
            echo "Head branch: ${{ github.event.workflow_run.head_branch }}"
          else
            echo "Event: ${{ github.event_name }} (no upstream workflow_run)."
            echo "Note: pull_request builds do not publish; manual dispatch is operator-gated."
          fi
          echo "Required gates (run inside GoFortress): lint, pre-commit, govulncheck, gitleaks, govet, tests."

  get_tag:
    needs: [gofortress-gate]
    runs-on: ubuntu-latest
    steps:
      - name: Determine deployment tag
        id: deployment_tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          WR_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WR_EVENT: ${{ github.event.workflow_run.event }}
        run: |
          # When triggered via workflow_run, github.ref points at the default branch
          # of the *triggering* workflow's repo state, not the original push ref.
          # For workflow_run, derive the tag from the upstream run: tag pushes set
          # workflow_run.head_branch to the tag name (e.g. v1.2.3); main pushes set
          # it to `main`. Direct push/tag and dispatch events fall back to ref.
          if [[ "$EVENT_NAME" == "workflow_run" && "$WR_EVENT" == "push" && "$WR_HEAD_BRANCH" =~ ^v[0-9] ]]; then
            tag="$WR_HEAD_BRANCH"
          elif [[ "$EVENT_NAME" == "push" && "$REF_TYPE" == "tag" ]]; then
            tag="$REF_NAME"
          else
            tag="latest"
          fi
          echo "version tag is $tag"
          echo "id=$tag" >> "$GITHUB_OUTPUT"
    outputs:
      deployment_tag: ${{ steps.deployment_tag.outputs.id }}

  # --------------------------------------------------------------------------------
  # Per-arch native build. Each matrix entry runs on a native runner of its target
  # architecture, cross-compiles the Go binary into dist/linux-<arch>/arcade, then
  # uses buildx to assemble a single-arch image from the thin runtime Dockerfile
  # and pushes it to GHCR by digest only. PRs build for verification but don't push.
  # --------------------------------------------------------------------------------
  build-and-push:
    needs: [get_tag, gofortress-gate]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      # Step 1: checkout code. For workflow_run events, check out the exact SHA
      # that GoFortress validated, not whatever HEAD happens to be on main now.
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # Step 2: install Go and warm the module / build cache for this runner.
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      # Step 3: build the binary natively into the dist layout the Dockerfile
      # expects. GOOS/GOARCH are explicit so the path matches even if a future
      # runner image defaults differ.
      - name: Build arcade binary
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist/linux-${{ matrix.arch }}
          go build -trimpath -ldflags="-s -w" -o dist/linux-${{ matrix.arch }}/arcade ./cmd/arcade

      # Step 4: Set up Docker Buildx (no QEMU needed — single-platform build on
      # a native runner of that platform).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # Step 5: login to GHCR (skipped on PRs since we don't push).
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 6a: PR build verifies the Dockerfile assembles for this arch but
      # never pushes anywhere.
      - name: Build image (PR verification, no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: false

      # Step 6b: non-PR build pushes by digest only (no tag). The merge-manifest
      # job stitches per-arch digests into the final multi-arch tag.
      - name: Build and push image by digest
        if: github.event_name != 'pull_request'
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      # Step 7: write the digest to a file named after itself so the merge job
      # can reconstruct the per-arch image references.
      - name: Export digest
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          touch "${RUNNER_TEMP}/digests/${DIGEST#sha256:}"

      - name: Upload digest artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # --------------------------------------------------------------------------------
  # Compose the per-arch digests into a single multi-arch manifest tagged
  # :<sha> and :<deployment_tag>. Skipped on PRs (no digests produced).
  # --------------------------------------------------------------------------------
  merge-manifest:
    needs: [build-and-push, get_tag]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digest artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compose and push multi-arch manifest
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          SHA_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
          DEPLOYMENT_TAG: ${{ needs.get_tag.outputs.deployment_tag }}
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE}:${SHA_TAG}" \
            --tag "${IMAGE}:${DEPLOYMENT_TAG}" \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Inspect resulting manifest
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          SHA_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: docker buildx imagetools inspect "${IMAGE}:${SHA_TAG}"
